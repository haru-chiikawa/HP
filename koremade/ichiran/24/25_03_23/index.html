<h1>「絆の日」記念交流イベント</h1>
	<p>2025年3月23日にサカエヒロバスにて開催された「『絆の日』記念交流イベント」にブースを出展しました。<br>
	防災すごろくを実施したり、奇跡の一本松のおがくずを使用したグッズの販売を行いました。おがくずの商品は一部が完売するほど多くの方にご購入いただきました。<br>
	奇跡の一本松の根の特別展示の隣でブースを出させていただいたこともあり、多くの方に足を運んでいただきました。<br>
	陸前高田市、名古屋市の両市市長様にもお越しいただきました。<br>
	お越しいただいた皆様、ありがとうございました。</p>
