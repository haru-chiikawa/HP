<h1>夏祭り@瑞穂区佛立寺</h1>
	<p>2025年8月2日・3日に瑞穂区佛立寺にて開催された夏祭りにブースを出展しました。<br>
	奇跡の一本松を使用したおがくずを使った2種類のキーホルダーやコースター、PCケースなどを販売させていただきました。また、全体にむけて、名古屋teamSの紹介をする機会もいただきました。<br>
	普段、防災・減災に興味のない方も、陸前高田や一本松について知るきっかけとなっていれば幸いです。</p>
